services:
  - type: web
    name: scribemind-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: AI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai/
      - key: CHAT_MODEL
        value: gemini-2.5-flash-lite
      - key: VISION_MODEL
        value: gemini-2.5-flash-lite
      - key: EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: EMBEDDING_DIM
        value: "768"
      - key: USE_MOCK_AI
        value: "false"
      - key: MAX_UPLOAD_MB
        value: "10"
      # Defina estes no painel do Render (Environment) — são segredos:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: AI_API_KEY
        sync: false
      # URL do frontend na Vercel (ex.: https://scribemind.vercel.app). Pode
      # deixar "*" no começo e restringir depois que a Vercel gerar a URL.
      - key: CORS_ORIGINS
        sync: false
